# Netlify config for email-signature
# Package directory: apps/email-signature (set in Netlify UI)
# Base directory: repository root (default)

[build]
  command = "pnpm nx build email-signature"
  publish = "apps/email-signature/dist/client"
  ignore = "! git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/email-signature libs/"

[build.environment]
  NODE_VERSION = "20"
