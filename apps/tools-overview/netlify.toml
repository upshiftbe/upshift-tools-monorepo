# Netlify config for tools-overview (Upshift Tools landing page)
# Package directory: apps/tools-overview (set in Netlify UI)
# Base directory: repository root (default)

[build]
  command = "pnpm nx build tools-overview"
  publish = "apps/tools-overview/dist"
  ignore = "! git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/tools-overview libs/"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
