# Netlify config for schema-markup-generator
# Package directory: apps/schema-markup-generator (set in Netlify UI)
# Base directory: repository root (default)

[build]
  command = "pnpm nx build schema-markup-generator"
  publish = "apps/schema-markup-generator/dist"
  ignore = "! git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/schema-markup-generator libs/"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
